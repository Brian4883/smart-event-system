{% extends 'base.html' %}
{% block content %}

<div class="container mt-5 d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
    <div class="col-md-5 glass-card w-100 fade-in-up" style="max-width: 450px;">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white text-center">
                <h3 class="text-gradient">Welcome Back</h3>
                <p class="mb-0">Enter your credentials to access your dashboard.</p>
            </div>

            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}

                    {% if form.non_field_errors %}
                    <div class="alert alert-danger">
                        {{ form.non_field_errors }}
                    </div>
                    {% endif %}

                    {{ form.as_p }}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" name="password" id="id_password" class="form-control" required>
                            <button type="button" class="btn btn-outline-secondary" id="togglePassword">
                                Show
                            </button>
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
                        <label class="form-check-label" for="remember_me">
                            Remember Me
                        </label>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-3 py-3">LOGIN TO ACCOUNT</button>
                </form>
            </div>

            <div class="card-footer text-center">
                <p class="mb-0">
                    <a href="{% url 'password_reset' %}">Forgot Password?
                </p>

                <span class="text-secondary d-block mt-2">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="text-primary text-decoration-none fw-bold">
                        Sign up here
                    </a>
                </span>
            </div>
        </div>
    </div>
</div>

<!-- Show Password Script -->
<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#id_password');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.textContent = type === 'password' ? 'Show' : 'Hide';
    });
</script>

{% endblock content %}
