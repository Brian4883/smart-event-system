{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Smart Event System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Smart Event</a>
    <div>
        {% if user.is_authenticated %}
            <span class="text-white me-3">Hello, {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
    <nav>
        <a href="/events/">Events</a>
        <a href="tickets/">My Tickets</a>
        <a href="/admin/">Admin</a>
    </nav>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-success btn-sm">Login</a>
            <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Register</a>
        {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>
<footer>
    <hr>
    <p>Smart Event System © 2026</p>
</footer>

</body>
</html>
