{% extends 'base.html' %}
{% block content %}
<div class="col-md-8 offset-md-2 mt-4">
    <h2>Notifications</h2>
    <ul class="list-group">
        {% for note in notifications %}
        <li
            class="list-group-item d-flex justify-content-between align-items-center {% if not note.is_read %}list-group-item-warning{% endif %}">
            {{ note.message }}
            <span class="text-muted small">{{ note.created_at|date:"M d, Y H:i" }}</span>
        </li>
        {% empty %}
        <li class="list-group-item">No notifications yet!</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
