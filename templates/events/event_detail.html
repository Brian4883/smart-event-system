{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <img src="{{ event.image.url }}" class="card-img-top" style="height:300px; object-fit:cover;">
        <div class="card-body">
            <h2>{{ event.title }}</h2>
            <p class="text-muted">{{ event.date }}</p>
            <p>{{ event.description }}</p>
        </div>
    </div>
</div>
{% endblock %}
